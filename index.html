<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RAKON Technology — Infraestructura Digital</title>
<link rel="icon" type="image/png" href="https://i.postimg.cc/25TDRnD3/f92e3e84-56ac-491e-b4c6-88d99d578808.png">
<meta name="theme-color" content="#0F1419">
<meta name="description" content="Infraestructura digital para negocios que quieren escalar.">
<style>
html,body{margin:0;padding:0;height:100%;width:100%;background:#0F1419;overflow:hidden}
#loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0F1419;color:#F5F1E8;z-index:10;transition:opacity .5s}
#loader.hide{opacity:0;pointer-events:none}
.spinner{width:42px;height:42px;border:3px solid rgba(27,182,177,.2);border-top-color:#1BB6B1;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.brand{font-weight:700;letter-spacing:.2em;font-size:.75rem;color:#1BB6B1}
iframe{border:0;width:100%;height:100vh;display:block}
</style>
</head>
<body>
<div id="loader"><div class="spinner"></div><div class="brand">RAKON · CARGANDO</div></div>
<iframe src="https://script.google.com/macros/s/AKfycbxvlFOJFYkr9Bd88KYUjQqFoS1KF5waL4Jy4a1vU2pgTDZs4dRUQTMzS26RZGC4YjfW/exec?app=hub" allow="clipboard-write; web-share" onload="document.getElementById('loader').classList.add('hide')"></iframe>
</body>
</html>
